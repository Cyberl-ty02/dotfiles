# Gentoo WSL make.conf
# Profile: default/linux/amd64/23.0/desktop
# Target: Windows 11 + WSL2 + Gentoo userland for CLI/dev work.
# Keep this WSL profile boring: no real kernel, GRUB, Secure Boot, SDDM, SonicDE, or NVIDIA kernel module stack.

# Preserve a portable WSL baseline while preferring Clang/LLVM system-wide.
COMMON_FLAGS="-O2 -pipe"
CLANG_LTO_FLAGS="-flto=thin"
FORTRAN_LTO_FLAGS="-flto"
CFLAGS="${COMMON_FLAGS} ${CLANG_LTO_FLAGS}"
CXXFLAGS="${COMMON_FLAGS} ${CLANG_LTO_FLAGS}"
# GCC Fortran does not support Clang's -flto=thin spelling.
FCFLAGS="${COMMON_FLAGS} ${FORTRAN_LTO_FLAGS}"
FFLAGS="${COMMON_FLAGS} ${FORTRAN_LTO_FLAGS}"

# Prefer Clang/LLVM, with package.env fallbacks for known exceptions.
CC="clang"
CXX="clang++"
CPP="clang-cpp"
AR="llvm-ar"
NM="llvm-nm"
RANLIB="llvm-ranlib"

# Prefer lld for Clang ThinLTO. Keep mold opt-in until it has been installed
# and tested manually; swap the two lines below when ready.
LDFLAGS="-fuse-ld=lld -Wl,-O1 -Wl,--as-needed -Wl,-z,pack-relative-relocs"
#LDFLAGS="-fuse-ld=mold -Wl,-O1 -Wl,--as-needed -Wl,-z,pack-relative-relocs"

# video_cards_d3d12 is useful for WSLg/Mesa D3D12; -passwdqc avoids pulling passwdqc policy.
WSL_USE="-passwdqc video_cards_d3d12"

# WSL base/dev flags. Avoid broad desktop stacks; WSLg is only for individual GUI apps.
WSL_BASE_USE="acl dbus icu unicode zstd compress-zstd"
DEV_USE="clang git gpg readline ssl sqlite threads"
WSLG_USE="X wayland egl opengl vulkan jpeg png webp svg truetype fontconfig harfbuzz"
MEDIA_LIGHT_USE="pipewire pulseaudio opus vpx"

USE="${WSL_USE} ${WSL_BASE_USE} ${DEV_USE} ${WSLG_USE} ${MEDIA_LIGHT_USE} -systemd -gnome -kde -plasma -sddm -networkmanager -grub -secureboot -modules-sign"

# Do NOT hard-code global PYTHON_TARGETS here. Follow the selected Gentoo profile.
# Add per-package Python compatibility in package.use/python only when needed.
# Example, if you really want to pin later:
# PYTHON_TARGETS="python3_13 python3_14"
# PYTHON_SINGLE_TARGET="python3_14"

MAKEOPTS="-j10 -l10"
PORTAGE_NICENESS=15
EMERGE_DEFAULT_OPTS="--autounmask --autounmask-keep-masks --autounmask-write=n --keep-going --jobs=4 --load-average=8"
FEATURES="candy compress-build-logs parallel-fetch userfetch userpriv usersandbox preserve-libs buildpkg binpkg-multi-instance"

LC_MESSAGES=C.utf8
L10N="en-US zh-CN"
LINGUAS="en_US zh_CN"

# WSLg/Mesa. Keep d3d12 acceleration and a swrast fallback.
VIDEO_CARDS="d3d12 swrast"
INPUT_DEVICES="libinput"

QEMU_SOFTMMU_TARGETS="x86_64 aarch64"
QEMU_USER_TARGETS="x86_64 aarch64"
LLVM_TARGETS="X86 NVPTX WebAssembly"

# Keep Portage's built-in wget-based fetch defaults. A fresh stage3 does not
# contain curl yet, so forcing /usr/bin/curl here would prevent bootstrapping.

# Default Gentoo distfiles mirror.
GENTOO_MIRRORS="https://distfiles.gentoo.org"
# Mainland China alternative (disable the line above before enabling this one).
#GENTOO_MIRRORS="https://mirrors.tuna.tsinghua.edu.cn/gentoo https://mirrors.ustc.edu.cn/gentoo"

# Optional proxy. Uncomment only when needed.
#https_proxy="http://127.0.0.1:7890"
#http_proxy="http://127.0.0.1:7890"
#all_proxy="socks5h://127.0.0.1:7890"

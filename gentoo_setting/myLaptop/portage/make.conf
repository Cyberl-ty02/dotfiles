# These settings were set by the catalyst build script that automatically
# built this stage.
# Please consult /usr/share/portage/config/make.conf.example for a more
# detailed example.

# ---- Compiler flags ----
COMMON_FLAGS="-march=native -O2 -pipe"

CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# NOTE: This stage was built with the bindist Use flag enabled

# This sets the language of build output to English.
# Please keep this setting intact when reporting bugs.
LC_MESSAGES=C.utf8

# Fast linker
LDFLAGS="-fuse-ld=mold"

# -------------------------------------------------------------------
# USE flag groups
# -------------------------------------------------------------------

# Compiler / compression / build features
COMPILER_USE="clang llvm-libunwind openmp zstd compress-zstd"

# Hardware / system integration
DEVICE_USE="bluetooth networkmanager smart thunderbolt"

# Init/session/desktop base
SESSION_USE="dbus elogind policykit udev"

# Graphics stack
GRAPHICS_USE="X wayland opengl vulkan"

# Qt / LXQt desktop direction
QT_USE="qt6 widgets qml"

LXQT_USE="about archiver desktop-portal display-manager filemanager icons lximage policykit processviewer screenshot sddm terminal admin nls powermanagement ssh-askpass wayland"

# Media / fonts / image formats
MEDIA_USE="jpeg png webp svg truetype fontconfig harfbuzz icu"

# Audio
AUDIO_USE="pipewire pulseaudio"

# Filesystem / boot / security
SYSTEM_USE="btrfs grub"

# Secure Boot / signed modules
SECURE_USE="secureboot modules-sign"

# -------------------------------------------------------------------
# Global USE
# -------------------------------------------------------------------
# No global gtk / gnome / gvfs / trash flags here.
# If a GTK tool is really needed later, enable it per-package.
# -------------------------------------------------------------------

USE="${COMPILER_USE} ${DEVICE_USE} ${SESSION_USE} ${GRAPHICS_USE} ${QT_USE} ${LXQT_USE} ${MEDIA_USE} ${AUDIO_USE} ${SYSTEM_USE} ${SECURE_USE}"

# -------------------------------------------------------------------
# Secure Boot / module signing
# -------------------------------------------------------------------
# Make sure these files exist before emerging packages that need them.
# -------------------------------------------------------------------

SECUREBOOT_SIGN_KEY="/root/secureboot/MOK.pem"
SECUREBOOT_SIGN_CERT="/root/secureboot/MOK.pem"

MODULES_SIGN_KEY="/root/secureboot/MOK.pem"
MODULES_SIGN_CERT="/root/secureboot/MOK.pem"

# -------------------------------------------------------------------
# Portage scheduling
# -------------------------------------------------------------------

MAKEOPTS="-j13 -l13"
PORTAGE_NICENESS=15

EMERGE_DEFAULT_OPTS="--autounmask --autounmask-keep-masks --autounmask-write=n --keep-going --jobs=2 --load-average=13"

# -------------------------------------------------------------------
# Portage features
# -------------------------------------------------------------------

FEATURES="candy compress-build-logs parallel-fetch userfetch userpriv usersandbox preserve-libs buildpkg binpkg-multi-instance"

# -------------------------------------------------------------------
# Localisation
# -------------------------------------------------------------------

L10N="en-US zh-CN"
LINGUAS="en_US zh_CN"

# -------------------------------------------------------------------
# Boot / input / graphics
# -------------------------------------------------------------------

GRUB_PLATFORMS="efi-64"

INPUT_DEVICES="libinput"

VIDEO_CARDS="nvidia modesetting intel"

# -------------------------------------------------------------------
# QEMU targets
# -------------------------------------------------------------------

QEMU_SOFTMMU_TARGETS="x86_64 aarch64"
QEMU_USER_TARGETS="x86_64 aarch64"

# -------------------------------------------------------------------
# LLVM targets
# -------------------------------------------------------------------
# X86: normal desktop/compiler target
# NVPTX: useful for CUDA/OpenMP offloading related LLVM tooling
# -------------------------------------------------------------------

LLVM_TARGETS="X86 NVPTX"

# -------------------------------------------------------------------
# Licenses
# -------------------------------------------------------------------
# Broad license acceptance is convenient for NVIDIA/CUDA/WPS/etc.
# You can narrow this later if desired.
# -------------------------------------------------------------------

# ACCEPT_LICENSE="*"

# -------------------------------------------------------------------
# Fetch commands
# -------------------------------------------------------------------

FETCHCOMMAND="/usr/bin/curl --retry 3 --connect-timeout 60 -Lfo \"\${DISTDIR}/\${FILE}\" \"\${URI}\""
RESUMECOMMAND="/usr/bin/curl -C - --retry 3 --connect-timeout 60 -Lfo \"\${DISTDIR}/\${FILE}\" \"\${URI}\""


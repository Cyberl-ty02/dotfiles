# Gentoo laptop make.conf
# Target: real laptop, amd64 OpenRC, LLVM-friendly, XLibre/SonicDE/NVIDIA/Secure Boot aware.

COMMON_FLAGS="-march=native -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

LC_MESSAGES=C.utf8

# Conservative global linker flags. Use mold/lld per-package only after the base system is stable.
LDFLAGS="-Wl,-O1 -Wl,--as-needed"
# LDFLAGS="-fuse-ld=mold"

# USE groups. Keep global USE moderate; package-specific desktop/chat/game flags belong in package.use.
COMPILER_USE="clang llvm-libunwind openmp zstd compress-zstd"
DEVICE_USE="bluetooth networkmanager smart thunderbolt"
SESSION_USE="dbus elogind policykit udev -systemd"
GRAPHICS_USE="X wayland opengl vulkan egl"
QT_USE="qt6 widgets qml"
DESKTOP_USE="display-manager sddm desktop-portal"
MEDIA_USE="jpeg png webp svg truetype fontconfig harfbuzz icu"
AUDIO_USE="pipewire pulseaudio"
SYSTEM_USE="btrfs grub"
SECURE_USE="secureboot modules-sign"

USE="${COMPILER_USE} ${DEVICE_USE} ${SESSION_USE} ${GRAPHICS_USE} ${QT_USE} ${DESKTOP_USE} ${MEDIA_USE} ${AUDIO_USE} ${SYSTEM_USE} ${SECURE_USE}"


# Multilib real laptop. This requires a multilib amd64 profile.
ABI_X86="64 32"

# Secure Boot / module signing.
# MOK.pem contains private key + certificate. Do not share it.
SECUREBOOT_SIGN_KEY="/etc/kernel/secureboot/MOK.pem"
SECUREBOOT_SIGN_CERT="/etc/kernel/secureboot/MOK.pem"
MODULES_SIGN_KEY="/etc/kernel/secureboot/MOK.pem"
MODULES_SIGN_CERT="/etc/kernel/secureboot/MOK.pem"

MAKEOPTS="-j13 -l13"
PORTAGE_NICENESS=15
EMERGE_DEFAULT_OPTS="--autounmask --autounmask-keep-masks --autounmask-write=n --keep-going --jobs=2 --load-average=13"

FEATURES="candy compress-build-logs parallel-fetch userfetch userpriv usersandbox preserve-libs buildpkg binpkg-multi-instance"

L10N="en-US zh-CN"
LINGUAS="en_US zh_CN"

GRUB_PLATFORMS="efi-64"
INPUT_DEVICES="libinput"
VIDEO_CARDS="nvidia modesetting intel"

QEMU_SOFTMMU_TARGETS="x86_64 aarch64"
QEMU_USER_TARGETS="x86_64 aarch64"
LLVM_TARGETS="X86 NVPTX WebAssembly"

# Uncomment only if you accept broad license behavior.
# ACCEPT_LICENSE="*"

FETCHCOMMAND="/usr/bin/curl --retry 3 --connect-timeout 60 -Lfo \"\${DISTDIR}/\${FILE}\" \"\${URI}\""
RESUMECOMMAND="/usr/bin/curl -C - --retry 3 --connect-timeout 60 -Lfo \"\${DISTDIR}/\${FILE}\" \"\${URI}\""

# Optional mirrors / proxy.
#GENTOO_MIRRORS="https://mirrors.ustc.edu.cn/gentoo/"
#https_proxy="http://127.0.0.1:7890"
#http_proxy="http://127.0.0.1:7890"
#all_proxy="socks5h://127.0.0.1:7890"

# These settings were set by the catalyst build script that automatically
# built this stage.
# Please consult /usr/share/portage/config/make.conf.example for a more
# detailed example.

# -------------------------------------------------------------------
# Compiler flags
# -------------------------------------------------------------------

COMMON_FLAGS="-march=native -O2 -pipe"

CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# Keep build logs in English for bug reports.
LC_MESSAGES=C.utf8

# -------------------------------------------------------------------
# Linker flags
# -------------------------------------------------------------------
# Conservative global linker flags.
# Do not force mold/lld globally on a toolchain + kernel + NVIDIA system.
# If needed, enable mold per-package through /etc/portage/package.env.
LDFLAGS="-Wl,-O1 -Wl,--as-needed"

# -------------------------------------------------------------------
# USE flag groups
# -------------------------------------------------------------------

# LLVM / compiler / compression / build features
# No global lto here. Enable LTO per-package only if needed.
COMPILER_USE="clang llvm-libunwind openmp zstd compress-zstd"

# Hardware / system integration
DEVICE_USE="bluetooth networkmanager smart thunderbolt"

# OpenRC desktop session base
SESSION_USE="dbus elogind policykit udev"

# Graphics stack
# Keep both X and wayland available; SonicDE/XLibre will mainly use X.
GRAPHICS_USE="X wayland opengl vulkan"

# Qt / KDE / SonicDE common base
# Do not put LXQt-specific flags here.
QT_USE="qt6 widgets qml"

# Display manager / desktop portal base
DESKTOP_USE="display-manager sddm desktop-portal"

# Media / fonts / image formats
MEDIA_USE="jpeg png webp svg truetype fontconfig harfbuzz icu"

# Audio
# pipewire is the modern audio server; pulseaudio flag keeps app compatibility.
AUDIO_USE="pipewire pulseaudio"

# Filesystem / boot / security
SYSTEM_USE="btrfs grub"

# Secure Boot / signed modules
SECURE_USE="secureboot modules-sign"

# -------------------------------------------------------------------
# Global USE
# -------------------------------------------------------------------
# Keep this as a desktop base, not as a full application list.
# Put KDE/SonicDE/LXQt/app-specific flags into package.use instead.
# -------------------------------------------------------------------

USE="${COMPILER_USE} ${DEVICE_USE} ${SESSION_USE} ${GRAPHICS_USE} ${QT_USE} ${DESKTOP_USE} ${MEDIA_USE} ${AUDIO_USE} ${SYSTEM_USE} ${SECURE_USE}"

# -------------------------------------------------------------------
# Secure Boot / module signing
# -------------------------------------------------------------------
# These paths are fine if you keep the key under /root.
# Remember: packages that need to read this key should use package.env
# with secureboot-rootbuild, because global FEATURES keeps userpriv enabled.
# -------------------------------------------------------------------

SECUREBOOT_SIGN_KEY="/root/secureboot/MOK.pem"
SECUREBOOT_SIGN_CERT="/root/secureboot/MOK.pem"

MODULES_SIGN_KEY="/root/secureboot/MOK.pem"
MODULES_SIGN_CERT="/root/secureboot/MOK.pem"

# -------------------------------------------------------------------
# Portage scheduling
# -------------------------------------------------------------------

MAKEOPTS="-j13 -l13"
PORTAGE_NICENESS=15

# --jobs controls how many packages Portage builds at once.
# Keep this much lower than MAKEOPTS on a laptop.
EMERGE_DEFAULT_OPTS="--autounmask --autounmask-keep-masks --autounmask-write=n --keep-going --jobs=2 --load-average=13"

# -------------------------------------------------------------------
# Portage features
# -------------------------------------------------------------------
# Keep sandbox/userpriv behavior enabled globally.
# Disable userpriv only per-package for Secure Boot key access if needed.
# buildpkg + binpkg-multi-instance are useful for rollback/reinstall.
# -------------------------------------------------------------------

FEATURES="candy compress-build-logs parallel-fetch userfetch userpriv usersandbox preserve-libs buildpkg binpkg-multi-instance"

# Optional, only if you later enable FEATURES=ccache.
# CCACHE_SIZE="20G"

# -------------------------------------------------------------------
# Localisation
# -------------------------------------------------------------------

L10N="en-US zh-CN"
LINGUAS="en_US zh_CN"

# -------------------------------------------------------------------
# Boot / input / graphics
# -------------------------------------------------------------------

GRUB_PLATFORMS="efi-64"

INPUT_DEVICES="libinput"

# For Intel iGPU + NVIDIA dGPU laptop.
# modesetting is useful for generic X stack.
VIDEO_CARDS="nvidia modesetting intel"

# -------------------------------------------------------------------
# QEMU targets
# -------------------------------------------------------------------

QEMU_SOFTMMU_TARGETS="x86_64 aarch64"
QEMU_USER_TARGETS="x86_64 aarch64"

# -------------------------------------------------------------------
# LLVM targets
# -------------------------------------------------------------------
# X86: normal amd64 desktop/compiler target.
# NVPTX: useful for NVIDIA/CUDA/OpenMP offloading related LLVM tooling.
# AMDGPU: optional; keep it if you want broader Mesa/LLVM compatibility.
# -------------------------------------------------------------------

LLVM_TARGETS="X86 NVPTX"

# If you want broader LLVM/Mesa compatibility, use this instead:
# LLVM_TARGETS="X86 AMDGPU NVPTX"

# -------------------------------------------------------------------
# Licenses
# -------------------------------------------------------------------
# Useful later for NVIDIA/CUDA/WPS/etc.
# Uncomment only if you accept broad license behavior.
# -------------------------------------------------------------------

# ACCEPT_LICENSE="*"

# -------------------------------------------------------------------
# Fetch commands
# -------------------------------------------------------------------

FETCHCOMMAND="/usr/bin/curl --retry 3 --connect-timeout 60 -Lfo \"\${DISTDIR}/\${FILE}\" \"\${URI}\""
RESUMECOMMAND="/usr/bin/curl -C - --retry 3 --connect-timeout 60 -Lfo \"\${DISTDIR}/\${FILE}\" \"\${URI}\""


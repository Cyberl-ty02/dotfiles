# Gentoo WSL make.conf
# Target: Windows 11 + WSL2 + Gentoo userland, CLI/dev focused.

COMMON_FLAGS="-march=native -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

LC_MESSAGES=C.utf8
LDFLAGS="-Wl,-O1 -Wl,--as-needed"

COMPILER_USE="clang llvm-libunwind openmp zstd compress-zstd"
WSL_BASE_USE="dbus icu unicode verify-sig"
DEV_USE="git gpg readline ssl sqlite threads"
GUI_USE="X wayland opengl vulkan egl jpeg png webp svg truetype fontconfig harfbuzz"
MEDIA_USE="pipewire pulseaudio opus vpx x264 x265"

USE="${COMPILER_USE} ${WSL_BASE_USE} ${DEV_USE} ${GUI_USE} ${MEDIA_USE} -systemd -gnome -kde -plasma -sddm -networkmanager -grub -secureboot -modules-sign"

PYTHON_TARGETS="python3_13 python3_14"
PYTHON_SINGLE_TARGET="python3_14"

# Only valid on a multilib amd64 profile. Check with scripts/check_multilib.sh.
ABI_X86="64 32"

MAKEOPTS="-j8 -l8"
PORTAGE_NICENESS=15
EMERGE_DEFAULT_OPTS="--autounmask --autounmask-keep-masks --autounmask-write=n --keep-going --jobs=2 --load-average=8"

FEATURES="candy compress-build-logs parallel-fetch userfetch userpriv usersandbox preserve-libs buildpkg binpkg-multi-instance"

L10N="en-US zh-CN"
LINGUAS="en_US zh_CN"

VIDEO_CARDS="d3d12 swrast"
INPUT_DEVICES="libinput"

QEMU_SOFTMMU_TARGETS="x86_64 aarch64"
QEMU_USER_TARGETS="x86_64 aarch64"
LLVM_TARGETS="X86 NVPTX WebAssembly"

# ACCEPT_LICENSE="*"

FETCHCOMMAND="/usr/bin/curl --retry 3 --connect-timeout 60 -Lfo \"\${DISTDIR}/\${FILE}\" \"\${URI}\""
RESUMECOMMAND="/usr/bin/curl -C - --retry 3 --connect-timeout 60 -Lfo \"\${DISTDIR}/\${FILE}\" \"\${URI}\""


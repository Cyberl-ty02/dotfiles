# These settings were set by the catalyst build script that automatically
# built this stage.
# Please consult /usr/share/portage/config/make.conf.example for a more
# detailed example.

#COMMON_FLAGS="-O2 -pipe"
# For gcc or other compiler
COMMON_FLAGS="-march=native -O2 -pipe -flto=thin"

CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# NOTE: This stage was built with the bindist Use flag enabled

# This sets the language of build output to English.
# Please keep this setting intact when reporting bugs.
LC_MESSAGES=C.utf8

# ---- USE flags ----
USE="daemon grub ${DEVICE_USE} ${COMPILER_USE} ${KDE_USE} ${LIB_USE}"

# Compiler / build related
COMPILER_USE="clang compress-zstd eselect-ldso lto zstd"

# Device / desktop related
DEVICE_USE="accessibility bluetooth networkmanager plymouth pipewire sddm smart thunderbolt wallpapers"

# KDE / Plasma related
KDE_USE="browser-integration crash-handler discover elogind firewall flatpak kwallet"

# Library / platform related
LIB_USE="colord crypt flatpak handbook wayland -gtk -gnome -gnome-shell -gnome-keyring -mysql postgres"


# ---- Portage scheduling ----
PORTAGE_NICENESS=15

# Adjust according to CPU / RAM.
MAKEOPTS="-j13 -l13"
EMERGE_DEFAULT_OPTS="--autounmask --autounmask-keep-masks --autounmask-write=n --keep-going -j13 -l13"

# ---- Binary packages / fetch / cache ----
FEATURES="getbinpkg binpkg-request-signature ccache parallel-fetch"
# CCACHE_SIZE="20G"

# ---- Localisation ----
L10N="en-US zh-CN"
LINGUAS="en_US zh_CN"

# ---- Boot / input / graphics ----
GRUB_PLATFORMS="efi-64"
INPUT_DEVICES="libinput evdev joystick"
VIDEO_CARDS="intel nvidia"

# ---- QEMU / LLVM targets ----
# Narrow these to reduce build time.
QEMU_SOFTMMU_TARGETS="x86_64 aarch64"
QEMU_USER_TARGETS="x86_64 aarch64"
LLVM_TARGETS="X86 AMDGPU NVPTX"

# ---- Download tools ----
FETCHCOMMAND="curl --retry 3 --connect-timeout 60 -Lfo \"\${DISTDIR}/\${FILE}\" \"\${URI}\""
RESUMECOMMAND="curl -C - --retry 3 --connect-timeout 60 -Lfo \"\${DISTDIR}/\${FILE}\" \"\${URI}\""

# ---- Optional mirrors / proxies ----
#GENTOO_MIRRORS="https://mirrors.ustc.edu.cn/gentoo/"
#https_proxy="socks5h://127.0.0.1:2080"
#http_proxy="socks5h://127.0.0.1:2080"
#ftp_proxy="socks5h://127.0.0.1:2080"